name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

# Required permissions for GitHub Pages deployments
permissions:
  contents: read
  pages: write
  id-token: write

# Prevent concurrent deployments
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build Site
        run: |
          # If using npm, uncomment the lines below:
          # npm install
          # npm run build
          echo "Building the project..."

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # If your build folder is different (like 'dist' or 'build'), 
          # change '.' to that folder name.
          path: '.' 

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4


